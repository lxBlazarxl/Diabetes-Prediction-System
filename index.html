<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diabetes Predictor</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 350px;
      }
      h2 {
        text-align: center;
        color: #333;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
      }
      button:hover {
        background-color: #0056b3;
      }
      #result {
        margin-top: 20px;
        padding: 15px;
        text-align: center;
        font-weight: bold;
        border-radius: 4px;
        display: none; /* Hidden until we get a result */
      }
      .healthy {
        background-color: #d4edda;
        color: #155724;
      }
      .diabetic {
        background-color: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Patient Data</h2>
      <form id="predictionForm">
        <div class="form-group">
          <label>Pregnancies</label
          ><input type="number" id="Pregnancies" required value="1" />
        </div>
        <div class="form-group">
          <label>Glucose</label
          ><input type="number" step="any" id="Glucose" required value="150" />
        </div>
        <div class="form-group">
          <label>Blood Pressure</label
          ><input
            type="number"
            step="any"
            id="BloodPressure"
            required
            value="120"
          />
        </div>
        <div class="form-group">
          <label>Skin Thickness</label
          ><input
            type="number"
            step="any"
            id="SkinThickness"
            required
            value="30"
          />
        </div>
        <div class="form-group">
          <label>Insulin</label
          ><input type="number" step="any" id="Insulin" required value="100" />
        </div>
        <div class="form-group">
          <label>BMI</label
          ><input type="number" step="any" id="BMI" required value="18.5" />
        </div>
        <div class="form-group">
          <label>Diabetes Pedigree Function</label
          ><input
            type="number"
            step="any"
            id="DiabetesPedigreeFunction"
            required
            value="0.5"
          />
        </div>
        <div class="form-group">
          <label>Age</label><input type="number" id="Age" required value="35" />
        </div>

        <button type="submit">Get Prediction</button>
      </form>

      <div id="result"></div>
    </div>

    <script>
      // Grab the form and listen for it to be submitted
      document
        .getElementById("predictionForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault(); // Stop the page from reloading

          // 1. Collect data from the inputs
          const patientData = {
            Pregnancies: parseInt(document.getElementById("Pregnancies").value),
            Glucose: parseFloat(document.getElementById("Glucose").value),
            BloodPressure: parseFloat(
              document.getElementById("BloodPressure").value,
            ),
            SkinThickness: parseFloat(
              document.getElementById("SkinThickness").value,
            ),
            Insulin: parseFloat(document.getElementById("Insulin").value),
            BMI: parseFloat(document.getElementById("BMI").value),
            DiabetesPedigreeFunction: parseFloat(
              document.getElementById("DiabetesPedigreeFunction").value,
            ),
            Age: parseInt(document.getElementById("Age").value),
          };

          const resultDiv = document.getElementById("result");
          resultDiv.style.display = "block";
          resultDiv.className = "";
          resultDiv.innerHTML = "Thinking...";

          try {
            // 2. Send the POST request to your FastAPI backend
            const response = await fetch("http://127.0.0.1:8000/predict", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(patientData),
            });

            if (!response.ok) {
              throw new Error("Something went wrong with the API");
            }

            // 3. Parse the JSON response and update the UI
            const data = await response.json();

            resultDiv.innerHTML = `Result: ${data.prediction} <br> Confidence: ${(data.confidence * 100).toFixed(2)}%`;

            // Add colors based on the result
            if (data.prediction === "Healthy") {
              resultDiv.classList.add("healthy");
            } else {
              resultDiv.classList.add("diabetic");
            }
          } catch (error) {
            resultDiv.innerHTML = `Error: ${error.message}`;
            resultDiv.style.backgroundColor = "#f8d7da";
          }
        });
    </script>
  </body>
</html>
